version: "3.8"

# Example: one-tenant full-stack deployment.
# Copy per tenant (or render via templates) and customize env/ports/domains.

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.4.13
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      # NOTE: for hard isolation, each tenant stack has its own env and secrets.
      METADATA_BACKEND: sql
      METADATA_DB_URL: ${METADATA_DB_URL}
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      REDIS_URL: redis://redis:6379/0
      AUTH_MODE: jwt
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      DEFAULT_TENANT_ID: ${TENANT_ID}
      TENANT_HEADER: x-tenant-id
    depends_on:
      - milvus
      - redis
      - mysql

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      METADATA_BACKEND: sql
      METADATA_DB_URL: ${METADATA_DB_URL}
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      REDIS_URL: redis://redis:6379/0
      AUTH_MODE: jwt
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      DEFAULT_TENANT_ID: ${TENANT_ID}
      TENANT_HEADER: x-tenant-id
    depends_on:
      - milvus
      - redis
      - mysql

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  mysql_data:

