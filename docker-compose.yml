version: "3.8"

# 使用 profiles 分离基础设施和应用层
#
# 生产服务器（所有服务）:  docker-compose --profile infra --profile app up -d
# Mac 本地调试（仅应用）:  docker-compose --profile app up -d
# 仅基础设施:             docker-compose --profile infra up -d

services:
  # ── 基础设施（profile: infra）───────────────────────────────
  etcd:
    profiles: [infra]
    image: quay.io/coreos/etcd:v3.5.14
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    profiles: [infra]
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  milvus-standalone:
    profiles: [infra]
    image: milvusdb/milvus:v2.4.13
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    profiles: [infra]
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── 应用层（profile: app）────────────────────────────────────
  api:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data/uploads:/app/data/uploads
    restart: unless-stopped

  worker:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    volumes:
      - ./data/uploads:/app/data/uploads
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  ui:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://api:8000/api
    depends_on:
      - api
    restart: unless-stopped

  control-plane:
    profiles: [control-plane]
    build:
      context: .
      dockerfile: docker/Dockerfile.control_plane
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./data/control_plane:/app/data/control_plane
    restart: unless-stopped

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
